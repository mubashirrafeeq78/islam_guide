name: Build Final Islam Guide
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Node.js 24 کی وارننگ ختم کرنے کے لیے
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # یہاں ہم نے ورژن 3.24.0 رکھا ہے تاکہ پیکجز کا ایرر ختم ہو
          flutter-version: '3.24.0' 
      
      - name: Clean & Get Packages
        run: |
          flutter clean
          flutter pub get
      
      - name: Force Generate Icons
        run: flutter pub run flutter_launcher_icons

      - name: Build Optimized APK
        # تمام جدید اور پرانی ڈیوائسز کی سپورٹ کے لیے
        run: flutter build apk --release --split-per-abi --target-platform android-arm,android-arm64

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Islam-Guide-Final
          # یہ راستہ (path) اب تمام جنریٹڈ APKs کو اٹھا لے گا
          path: build/app/outputs/flutter-apk/*.apk
